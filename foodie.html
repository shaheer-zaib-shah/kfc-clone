<!DOCTYPE html>
<html>

  <head>

    <title>Foodie</title>

    <link href='https://fonts.googleapis.com/css?family=Roboto' rel='stylesheet'>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">


    <style>
      body {
          font-family: 'Roboto';font-size: 22px;
      }
      </style>

    <link rel="stylesheet" href="foodie.css">
  </head>

  <body style="background-color: black;">


    <div class="header">

      <img src="images/preferences.png" class="menu">
      <img src="images/kfc logo.png" class="kfc-logo">

      <button class="delivery-button">
        <b>DELIVERY</b>
      </button>

      <button class="pickup-button">
        <b>PICKUP</b>
      </button>

      <button class="login-button">
        <b>LOGIN</b>
      </button>

    </div>
    
    <!-- <div>
      <img src="images/kfc-banner-image.jpg" class="kfc-banner-image">
    </div> -->
    <div class="carousel-wrap" id="carousel">
      <div class="carousel-track" id="track">
        <div class="slide"><img src="images/kfc-banner-image.jpg" class="kfc-banner-image"></div>
        <div class="slide"><img src="images/kfc-banner-image2.jpg" class="kfc-banner-image"></div>
        <div class="slide"><img src="images/kfc-banner-image3.jpg" class="kfc-banner-image"></div>
      </div>
      <button class="carousel-btn prev" onclick="move(-1)" aria-label="Previous">&#8592;</button>
      <button class="carousel-btn next" onclick="move(1)" aria-label="Next">&#8594;</button>
    </div>
    <div class="dots" id="dots"></div>

    <div>
      <button class="reorder-button">
        <b>REORDER</b>
      </button>
    </div>

    <div class="container">

      <div>
       <h2 class="explore-menu"><u class="underliner-explo">EXPLO</u>RE MENU</h2>
      </div>

      <div class="menu-container">

       <div class="meal1-div">

         <button class="meal1-button">
          <img src="images/meal-1.png" class="meal1" onclick="openPopup('chickenChipsPopup')">
          <h6 class="everyday-value">Ever<u class="underlined-everyday">yday v</u>alue</h6>
         </button>

       </div>

       <div class="meal2-div">

         <button class="meal2-button">
          <img src="images/meal-2.png" class="meal2" onclick="openPopup('chickenChipsPopup')">
          <h6 class="ala-carte">Ala-Ca<u class="underlined-ala-carte">rte-&-C</u>ombos</h6>
         </button>

       </div>

       <div class="meal1-div">

        <button class="meal1-button" onclick="openPopup('chickenChipsPopup')">
         <img src="images/meal-3.png" class="meal1">
         <h6 class="everyday-value">P<u class="underlined-everyday">romotio</u>n</h6>
        </button>

      </div>

      <div class="meal1-div">

        <button class="meal1-button" onclick="openPopup('chickenChipsPopup')">
         <img src="images/meal-4.png" class="meal1">
         <h6 class="everyday-value">Sign<u class="underlined-everyday">atunre B</u>oxes</h6>
        </button>

      </div>

      <div class="meal1-div">

        <button class="meal1-button" onclick="openPopup('chickenChipsPopup')">
         <img src="images/meal-5.png" class="meal1">
         <h6 class="everyday-value"><u class="underlined-everyday">Sharing</u></h6>
        </button>

      </div>

      </div>

      <div>

        <h2 class="explore-menu"><u class="underliner-explo">BEST </u>SELLERS</h2>

      </div>

      <div class="menu2-container">


        <div class="best-seller-items">
          <button class="best-seller-buttons" onclick="openPopup('krunchBurger')">
            
              <span class="span-red">bl</span>
              <span class="span-red">bl</span>
              <span class="span-red">bl</span>
              
              <span style="display: block;">KRUNCH BURGER</span>
              <h5> <span class="money1" style="margin-bottom: 0px;">Rs.310</span> </h5>
              <img src="images/best1c.png" class="best1img">
            
          </button>
        </div>

        <div class="best-seller-items">
          <button class="best-seller-buttons" onclick="openPopup('krunchCombo')">
            
              <span class="span-red">bl</span>
              <span class="span-red">bl</span>
              <span class="span-red">bl</span>
              
              <span style="display: block;">KRUNCH  COMBO</span>
              <h5> <span class="money1" style="margin-bottom: 0px;">Rs.420</span> </h5>
              <img src="images/best2.png" class="best1img">
            
          </button>
        </div>

        <div class="best-seller-items">
          <button class="best-seller-buttons" onclick="openPopup('chickenChips')">
            
              <span class="span-red">bl</span>
              <span class="span-red">bl</span>
              <span class="span-red">bl</span>
              
              <span style="display: block;">CHICKEN & CHIPS</span>
              <h5> <span class="money1" style="margin-bottom: 0px;">Rs.530</span> </h5>
              <img src="images/best3.png" class="best1img">
            
          </button>
        </div>

        <div class="best-seller-items" onclick="openPopup('hotWingsBucket')">
          <button class="best-seller-buttons">
              <span class="span-red">bl</span>
              <span class="span-red">bl</span>
              <span class="span-red">bl</span>
              
              <span style="display: block;">HOT WINGS BUCKET</span>
              <h5> <span class="money1" style="margin-bottom: 0px;">Rs.640</span> </h5>
              <img src="images/best4.png" class="best1img">
            
          </button>
        </div>

      </div>


      <div>

        <h2 class="explore-menu" ><u class="underliner-explo">TOP D</u>EALS</h2>

      </div>

      <div class="menu3-container">

        <div class="best-seller-items">
          <button class="best-seller-buttons" style="border-radius: 8px;" onclick="openPopup('zingerDeal1')">
            
              <span class="span-red">bl</span>
              <span class="span-red">bl</span>
              <span class="span-red">bl</span>
              
              
              <img src="images/burger1.png" class="best1img">
              <span style="display: block;">HOT WINGS BUCKET</span>

              <p class="burger1-discription">1 Zinger Stacker + 1 Regular fries + 1 Regular drink</p>
              <h5> <span class="money-menu3" >+ADD TO BUCKET</span></h5>
          </button>
        </div>

        <div class="best-seller-items">
          <button class="best-seller-buttons" style="border-radius: 8px;"  onclick="openPopup('zingerDeal2')">
            
              <span class="span-red">bl</span>
              <span class="span-red">bl</span>
              <span class="span-red">bl</span>
              
              
              <img src="images/burger2.png" class="best1img">
              <span style="display: block;">HOT WINGS BUCKET</span>

              <p class="burger1-discription">1 Zinger Stacker + 1 Regular fries + 1 Regular drink</p>
              <h5> <span class="money-menu3" >+ADD TO BUCKET</span> </h5>
          </button>
        </div>

        <div class="best-seller-items">
          <button class="best-seller-buttons" style="border-radius: 8px;" onclick="openPopup('zingerDeal3')">
            
              <span class="span-red">bl</span>
              <span class="span-red">bl</span>
              <span class="span-red">bl</span>
              
              
              <img src="images/burger3.png" class="best1img">
              <span style="display: block;">HOT WINGS BUCKET</span>

              <p class="burger1-discription">1 Zinger Stacker + 1 Regular fries + 1 Regular drink</p>
              <h5> <span class="money-menu3" style="vertical-align: top;">+ADD TO BUCKET</span></h5>
          </button>
        </div>

      </div>

      <div class="ads-div">

        <div >
          <img src="images/ad1.png" class="ads">
        </div>

        <div class="ads">
          <img src="images/ad2.png" class="ads">
        </div>

      </div>
